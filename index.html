<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Lot dato</title>
<meta name="viewport" content="user-scalable=no, width=device-width, initial-scale=1">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="icon" href="dg.png">
<link rel="apple-touch-icon" href="dg.png">

<style>
body 
{
    font-family: sans-serif;
}
h1 
{
    font-size:1.5em;
}
#f1, #f2 
{
    font-size:1em;
}
</style>
</head>

<body ontouchmove="BlockMove(event);">
<h1>LOT DATO</h1>

<p>
    Lot&nbsp; <input id="f1" type="text" size="3" inputmode="numeric">
</p>

<p>
    Dato  <input id="f2" type="text" size="3">
</p>

<p>
    <button onclick="vis()">Dato</button>
    <button onclick="vis1()">Lot</button>
</p>

<script>
var vf1=document.getElementById("f1");
var vf2=document.getElementById("f2");
var ym=[31,28,31,30,31,30,31,31,30,31,30,31];

function BlockMove(event) 
{
    event.preventDefault();
}

function vis()
{
    var s1 = vf1.value;
    var s2 = dateFromDay(s1);
    vf2.value = s2;

}

function vis1()
{
    var s2 = vf2.value;
    var s1 = dayFromDate(s2);
    vf1.value = s1;

}

function dateFromDay(day)
{
    var mo=0;
    var md=0;
    while (ym[mo]<day)
    {
        day-=ym[mo];
        mo++;
    }
    return ""+day+"/"+(mo+1); 
}

function dayFromDate(date)
{
    var md=date.split("/");
    var dd=0;
    for (i=0;i<Number(md[1]-1);i++)
    {
        dd += ym[i];
    }
    return dd+Number(md[0]); 
}

</script>
</body>
</html>
